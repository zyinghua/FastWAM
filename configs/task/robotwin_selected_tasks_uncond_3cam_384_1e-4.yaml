# @package _global_

defaults:
  - override /data: robotwin_selected_tasks
  - override /model: fastwam
  - _self_

# dataloading
batch_size: 8
num_workers: 4

model:
  mot_checkpoint_mixed_attn: false
  # Intentional deviation from README Model Preparation step 2: initialize the
  # video expert from Wan2.2, but keep the 1024-d ActionDiT random.
  action_dit_pretrained_path: null
  skip_dit_load_from_pretrain: false

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 10
save_every: 250
eval_every: 500

# training
gradient_accumulation_steps: 2
weight_decay: 1e-2
resume: null

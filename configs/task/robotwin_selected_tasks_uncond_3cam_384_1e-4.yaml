# @package _global_

defaults:
  - override /data: robotwin_selected_tasks
  - override /model: fastwam
  - _self_

# dataloading
batch_size: 8
num_workers: 4

model:
  mot_checkpoint_mixed_attn: false

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 10
save_every: 250
eval_every: 500

# training
gradient_accumulation_steps: 4
weight_decay: 1e-2
resume: null
